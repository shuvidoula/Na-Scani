<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="НА-СКАНІ">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#4f5b35">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob:; manifest-src 'self'; worker-src 'self'; connect-src 'none'; navigate-to 'self' blob:; base-uri 'none'; form-action 'none';">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="src/css/app.css">
  <title>НА-СКАНІ</title>
</head>
<body>
  <div id="app" class="app-shell">
    <header class="app-header">
      <div class="brand-mini">
        <div class="app-mark">НС</div>
        <div class="brand-copy">
          <div class="title">НА-СКАНІ</div>
          <div id="docStatus" class="subtitle">Локальний сканер</div>
        </div>
      </div>
      <button id="newDocBtn" class="icon-button" type="button" aria-label="Новий документ">+</button>
    </header>

    <main class="app-main">
      <section id="capturePage" class="capture-page">
        <div class="camera-panel">
          <video id="camera" playsinline muted autoplay></video>
          <canvas id="guideCanvas" aria-hidden="true"></canvas>
          <div id="cameraFallback" class="camera-fallback" hidden>
            <strong>Камера недоступна</strong>
            <span>Можна додати фото з галереї.</span>
          </div>
        </div>

        <div class="mode-row" role="group" aria-label="Режим сканування">
          <button class="mode-btn active" type="button" data-mode="bw">ЧБ скан</button>
          <button class="mode-btn" type="button" data-mode="gray">Сірий</button>
          <button class="mode-btn" type="button" data-mode="color">Колір</button>
        </div>

        <div class="capture-actions">
          <button id="pickBtn" class="tool-button" type="button" aria-label="Додати з галереї">
            <span>⌁</span>
          </button>
          <button id="scanBtn" class="scan-button" type="button" aria-label="Сканувати"></button>
          <button id="finishBtn" class="tool-button" type="button" aria-label="Переглянути">
            <span>✓</span>
          </button>
        </div>
      </section>

      <section id="reviewPage" class="review-page" hidden>
        <div id="emptyState" class="empty-state">
          <strong>Документ порожній</strong>
          <span>Зробіть перший скан або додайте фото.</span>
        </div>

        <div id="pagePreview" class="page-preview" hidden>
          <img id="previewImage" alt="Поточна сторінка">
          <div id="cropLayer" class="crop-layer" hidden>
            <div id="cropBox" class="crop-box"></div>
          </div>
        </div>

        <div id="thumbList" class="thumb-list" aria-label="Сторінки документа"></div>

        <div class="review-tools">
          <button id="backToCameraBtn" class="action-btn" type="button">Скан</button>
          <button id="rotateBtn" class="action-btn" type="button">⟳</button>
          <button id="cropBtn" class="action-btn" type="button">Обрізати</button>
          <button id="deleteBtn" class="action-btn danger" type="button">Видалити</button>
          <button id="shareBtn" class="action-btn primary" type="button">Поділитись</button>
        </div>
      </section>
    </main>

    <input id="fileInput" class="hidden-file" type="file" accept="image/*" capture="environment">
    <canvas id="workCanvas" hidden></canvas>
    <canvas id="cropCanvas" hidden></canvas>
    <div id="appToast" class="app-toast" role="status" aria-live="polite"></div>
  </div>

  <script src="src/js/boot-errors.js?v=0.2.3"></script>
  <script src="vendor/jscanify/opencv.js?v=1.4.2"></script>
  <script src="vendor/jscanify/jscanify.js?v=1.4.2"></script>
  <script src="src/js/app.js?v=0.2.4"></script>
</body>
</html>
